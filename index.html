<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Script Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f10;
      --surface:  #141618;
      --border:   #252729;
      --border2:  #2e3133;
      --muted:    #5a5f63;
      --text:     #c9cdd1;
      --bright:   #e8eaed;
      --accent:   #f0c040;
      --red:      #e05c5c;
      --green:    #5cb85c;
      --blue:     #5b9bd5;
      --orange:   #d9834a;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ---- Layout ---- */
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--bright);
      letter-spacing: .03em;
    }
    header span {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
    }

    /* ---- Left panel ---- */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drop-zone {
      margin: 20px;
      border: 1px dashed var(--border2);
      border-radius: 3px;
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.dragging {
      border-color: var(--accent);
      background: rgba(240,192,64,.04);
    }
    .drop-zone p {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
    .drop-zone strong {
      color: var(--accent);
      font-weight: 500;
    }

    .file-input { display: none; }

    textarea {
      flex: 1;
      margin: 0 20px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--bright);
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.7;
      padding: 14px;
      resize: none;
      outline: none;
      tab-size: 4;
      transition: border-color .15s;
      min-height: 340px;
    }
    textarea:focus { border-color: var(--border2); }
    textarea::placeholder { color: var(--muted); }

    .actions {
      padding: 0 20px 20px;
      display: flex;
      gap: 10px;
    }

    button {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      padding: 9px 18px;
      letter-spacing: .04em;
      transition: opacity .1s, background .1s;
    }
    button:active { opacity: .8; }

    .btn-scan {
      background: var(--accent);
      color: #0d0f10;
    }
    .btn-scan:hover { background: #f5cc55; }

    .btn-clear {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border2);
    }
    .btn-clear:hover { color: var(--text); border-color: var(--muted); }

    /* ---- Right panel ---- */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .results-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 20px;
    }
    .results-area::-webkit-scrollbar { width: 6px; }
    .results-area::-webkit-scrollbar-track { background: transparent; }
    .results-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ---- Summary bar ---- */
    .summary {
      display: none;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 18px;
      flex-wrap: wrap;
    }
    .summary.visible { display: flex; }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .stat-val {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
    }

    /* ---- Category sections ---- */
    .cat {
      border-bottom: 1px solid var(--border);
    }
    .cat-head {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      transition: background .1s;
    }
    .cat-head:hover { background: rgba(255,255,255,.02); }

    .cat-tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 2px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .tag-remote  { background: rgba(91,155,213,.15); color: var(--blue); }
    .tag-data    { background: rgba(92,184,92,.15);  color: var(--green); }
    .tag-back    { background: rgba(224,92,92,.15);  color: var(--red); }
    .tag-sus     { background: rgba(217,131,74,.15); color: var(--orange); }

    .cat-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--bright);
      flex: 1;
    }
    .cat-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .cat-arrow {
      font-size: 10px;
      color: var(--muted);
      transition: transform .15s;
    }
    .cat.collapsed .cat-arrow { transform: rotate(-90deg); }
    .cat.collapsed .cat-body  { display: none; }

    .cat-body { padding: 0 20px 14px; }

    .finding {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .finding-meta {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 11px;
    }
    .line-num {
      color: var(--muted);
    }
    .line-num strong {
      color: var(--accent);
      font-weight: 500;
    }
    .match-name {
      color: var(--text);
      flex: 1;
    }
    .sev {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 2px;
      text-transform: uppercase;
    }
    .sev-high   { background: rgba(224,92,92,.2);  color: var(--red); }
    .sev-medium { background: rgba(217,131,74,.2); color: var(--orange); }
    .sev-low    { background: rgba(91,155,213,.2); color: var(--blue); }
    .sev-info   { background: rgba(90,95,99,.2);   color: var(--muted); }

    .finding-code {
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--text);
      line-height: 1.6;
      white-space: pre;
      overflow-x: auto;
      tab-size: 4;
    }
    .finding-code::-webkit-scrollbar { height: 4px; }
    .finding-code::-webkit-scrollbar-thumb { background: var(--border2); }

    .hl { color: var(--accent); font-weight: 600; }
    .hl-red { color: var(--red); font-weight: 600; }

    .finding-desc {
      padding: 6px 12px 10px;
      font-size: 11.5px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }
    .empty-state p {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .no-findings {
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    /* ---- Responsive ---- */
    @media (max-width: 780px) {
      main { grid-template-columns: 1fr; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
      textarea { min-height: 220px; }
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <h1>rbx-scan</h1>
    <span>Roblox Script Analysis Tool</span>
  </header>

  <main>
    <!-- LEFT: input -->
    <div class="panel-left">
      <div class="panel-header">
        <span>Script Input</span>
        <span id="char-count">0 chars</span>
      </div>

      <div class="drop-zone" id="drop-zone">
        <p><strong>Drop a .lua / .txt file here</strong></p>
        <p style="margin-top:5px">or paste your script below</p>
        <input type="file" class="file-input" id="file-input" accept=".lua,.txt,.luau" />
      </div>

      <textarea id="script-input" placeholder="-- Paste Roblox Lua script here...
-- Supports: LocalScript, Script, ModuleScript"></textarea>

      <div class="actions">
        <button class="btn-scan" id="btn-scan">Scan Script</button>
        <button class="btn-clear" id="btn-clear">Clear</button>
      </div>
    </div>

    <!-- RIGHT: results -->
    <div class="panel-right">
      <div class="panel-header">
        <span>Results</span>
      </div>

      <div class="summary" id="summary">
        <div class="stat">
          <span class="stat-val" id="s-total" style="color:var(--bright)">0</span>
          <span class="stat-label">Total Findings</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="s-back" style="color:var(--red)">0</span>
          <span class="stat-label">Backdoors</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="s-sus" style="color:var(--orange)">0</span>
          <span class="stat-label">Suspicious</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="s-remote" style="color:var(--blue)">0</span>
          <span class="stat-label">Remotes</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="s-data" style="color:var(--green)">0</span>
          <span class="stat-label">DataStore</span>
        </div>
      </div>

      <div class="results-area" id="results-area">
        <div class="empty-state" id="empty-state">
          <p>No script scanned yet.</p>
          <p style="margin-top:8px">Paste a script and hit Scan.</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ============================================================
//  Detection rules
// ============================================================
const RULES = {
  backdoor: [
    {
      id: 'loadstring',
      pattern: /\bloadstring\s*\(/g,
      name: 'loadstring()',
      severity: 'high',
      desc: 'Executes arbitrary Lua code from a string at runtime. Commonly used in backdoors to run downloaded or obfuscated payloads.'
    },
    {
      id: 'http_require',
      pattern: /require\s*\(\s*\d+\s*\)/g,
      name: 'require() with asset ID',
      severity: 'high',
      desc: 'Requiring a numeric asset ID at runtime loads external code from Roblox asset library. A classic backdoor vector.'
    },
    {
      id: 'getfenv',
      pattern: /\bgetfenv\s*\(/g,
      name: 'getfenv()',
      severity: 'high',
      desc: 'Accesses the function environment. Used by backdoors to steal or manipulate global state.'
    },
    {
      id: 'setfenv',
      pattern: /\bsetfenv\s*\(/g,
      name: 'setfenv()',
      severity: 'high',
      desc: 'Replaces a function environment. Lets malicious code hijack the execution context of other functions.'
    },
    {
      id: 'syn_request',
      pattern: /\bsyn\.request\s*\(/g,
      name: 'syn.request()',
      severity: 'high',
      desc: 'Executor-only HTTP function. Should never appear in legitimate game scripts.'
    },
    {
      id: 'http_request',
      pattern: /\bHttpService\s*:\s*RequestAsync\s*\(/g,
      name: 'HttpService:RequestAsync()',
      severity: 'medium',
      desc: 'Makes an outbound HTTP request. Can be used to exfiltrate player data or receive remote commands.'
    },
    {
      id: 'discord_webhook',
      pattern: /discord\.com\/api\/webhooks/g,
      name: 'Discord webhook URL',
      severity: 'high',
      desc: 'Hardcoded Discord webhook. Often used to exfiltrate player info, auth tokens, or game data.'
    },
    {
      id: 'global_g',
      pattern: /_G\s*\[/g,
      name: '_G[] global table access',
      severity: 'medium',
      desc: 'Accessing the shared global table via string key. Used to hide functions or communicate between scripts stealthily.'
    },
    {
      id: 'obfusc_hex',
      pattern: /(?:\\x[0-9a-fA-F]{2}){6,}/g,
      name: 'Hex-encoded string (6+ bytes)',
      severity: 'high',
      desc: 'Long hex escape sequence. Obfuscated strings are commonly used to hide malicious URLs, function names, or code.'
    },
    {
      id: 'string_char',
      pattern: /string\.char\s*\(\s*(?:\d+\s*,\s*){4,}\d+\s*\)/g,
      name: 'string.char() with many args',
      severity: 'high',
      desc: 'Building strings byte-by-byte to evade plain-text scanning. A standard obfuscation technique.'
    },
  ],

  suspicious: [
    {
      id: 'pcall_loadstring',
      pattern: /pcall\s*\(\s*loadstring/g,
      name: 'pcall(loadstring ...)',
      severity: 'high',
      desc: 'Silent execution of dynamic code. The pcall wrapper hides errors, making backdoor execution harder to detect.'
    },
    {
      id: 'hookfunction',
      pattern: /\bhookfunction\s*\(/g,
      name: 'hookfunction()',
      severity: 'high',
      desc: 'Executor function that replaces another function at runtime. Not available in normal Roblox scripts.'
    },
    {
      id: 'newcclosure',
      pattern: /\bnewcclosure\s*\(/g,
      name: 'newcclosure()',
      severity: 'high',
      desc: 'Executor-only function used to wrap Lua closures as C closures to evade detection.'
    },
    {
      id: 'getgc',
      pattern: /\bgetgc\s*\(/g,
      name: 'getgc()',
      severity: 'high',
      desc: 'Returns all GC references. Used by exploits to find and hook internal functions.'
    },
    {
      id: 'debug_getinfo',
      pattern: /\bdebug\.getinfo\s*\(/g,
      name: 'debug.getinfo()',
      severity: 'medium',
      desc: 'Inspects function metadata. Can be misused for anti-tamper or to fingerprint the execution environment.'
    },
    {
      id: 'rawset',
      pattern: /\brawset\s*\(/g,
      name: 'rawset()',
      severity: 'low',
      desc: 'Bypasses __newindex metamethods. Suspicious when combined with other obfuscation patterns.'
    },
    {
      id: 'rawget',
      pattern: /\brawget\s*\(/g,
      name: 'rawget()',
      severity: 'low',
      desc: 'Bypasses __index metamethods. Sometimes used to access sandbox-restricted globals.'
    },
    {
      id: 'hidden_require',
      pattern: /\brequire\s*\(\s*game\.(?:GetService|service)\s*/g,
      name: 'require() via indirect service',
      severity: 'medium',
      desc: 'Loading modules through indirect service references. Can obscure the actual module being loaded.'
    },
    {
      id: 'long_string',
      pattern: /["'][^"'\n]{300,}["']/g,
      name: 'Very long string literal (300+ chars)',
      severity: 'medium',
      desc: 'Unusually long string constant. May be base64-encoded or otherwise obfuscated payload data.'
    },
    {
      id: 'b64_pattern',
      pattern: /[A-Za-z0-9+\/]{40,}={0,2}/g,
      name: 'Possible base64 string',
      severity: 'medium',
      desc: 'Looks like a base64-encoded blob. Often used to hide URLs, scripts, or data from plain-text inspection.'
    },
  ],

  remote: [
    {
      id: 'fire_server',
      pattern: /\bFireServer\s*\(/g,
      name: 'FireServer()',
      severity: 'info',
      desc: 'Client firing a RemoteEvent to the server. Normal in LocalScripts; verify the handler validates input.'
    },
    {
      id: 'fire_client',
      pattern: /\bFireClient\s*\(/g,
      name: 'FireClient()',
      severity: 'info',
      desc: 'Server firing a RemoteEvent to a specific client.'
    },
    {
      id: 'fire_all_clients',
      pattern: /\bFireAllClients\s*\(/g,
      name: 'FireAllClients()',
      severity: 'info',
      desc: 'Server broadcasting to all clients. Make sure sensitive data is not leaked to untrusted clients.'
    },
    {
      id: 'invoke_server',
      pattern: /\bInvokeServer\s*\(/g,
      name: 'InvokeServer()',
      severity: 'info',
      desc: 'Client invoking a RemoteFunction on the server. Ensure the server-side callback validates all arguments.'
    },
    {
      id: 'invoke_client',
      pattern: /\bInvokeClient\s*\(/g,
      name: 'InvokeClient()',
      severity: 'medium',
      desc: 'Server invoking a RemoteFunction on a client. This can hang the server thread if the client never responds. Avoid when possible.'
    },
    {
      id: 'on_server_event',
      pattern: /\bOnServerEvent\s*:/g,
      name: 'OnServerEvent listener',
      severity: 'info',
      desc: 'Server-side RemoteEvent handler. Ensure client-supplied arguments are sanitized.'
    },
    {
      id: 'on_client_event',
      pattern: /\bOnClientEvent\s*:/g,
      name: 'OnClientEvent listener',
      severity: 'info',
      desc: 'Client-side RemoteEvent handler.'
    },
    {
      id: 'remote_event_new',
      pattern: /Instance\.new\s*\(\s*["']RemoteEvent["']/g,
      name: 'new RemoteEvent instance',
      severity: 'info',
      desc: 'Creating a RemoteEvent at runtime.'
    },
    {
      id: 'remote_func_new',
      pattern: /Instance\.new\s*\(\s*["']RemoteFunction["']/g,
      name: 'new RemoteFunction instance',
      severity: 'info',
      desc: 'Creating a RemoteFunction at runtime.'
    },
    {
      id: 'bindable_event',
      pattern: /Instance\.new\s*\(\s*["']BindableEvent["']/g,
      name: 'new BindableEvent instance',
      severity: 'info',
      desc: 'Server-to-server or client-to-client event. Less of a security concern than RemoteEvent.'
    },
  ],

  datastore: [
    {
      id: 'get_datastore',
      pattern: /\bGetDataStore\s*\(/g,
      name: 'GetDataStore()',
      severity: 'info',
      desc: 'Accessing a named DataStore. Check that keys are scoped per-player and not overly broad.'
    },
    {
      id: 'get_global_ds',
      pattern: /\bGetGlobalDataStore\s*\(/g,
      name: 'GetGlobalDataStore()',
      severity: 'low',
      desc: 'Accessing the global DataStore. Prefer named stores for better organization and isolation.'
    },
    {
      id: 'set_async',
      pattern: /\bSetAsync\s*\(/g,
      name: 'SetAsync()',
      severity: 'info',
      desc: 'Writing to a DataStore key. Avoid calling without pcall; a failure here can corrupt player data.'
    },
    {
      id: 'get_async',
      pattern: /\bGetAsync\s*\(/g,
      name: 'GetAsync()',
      severity: 'info',
      desc: 'Reading from a DataStore key.'
    },
    {
      id: 'update_async',
      pattern: /\bUpdateAsync\s*\(/g,
      name: 'UpdateAsync()',
      severity: 'info',
      desc: 'Atomic DataStore update. Preferred over SetAsync for safe concurrent writes.'
    },
    {
      id: 'remove_async',
      pattern: /\bRemoveAsync\s*\(/g,
      name: 'RemoveAsync()',
      severity: 'low',
      desc: 'Deleting a DataStore key. Verify this is intentional; permanent data loss can occur.'
    },
    {
      id: 'increment_async',
      pattern: /\bIncrementAsync\s*\(/g,
      name: 'IncrementAsync()',
      severity: 'info',
      desc: 'Atomic integer increment in DataStore.'
    },
    {
      id: 'ordered_ds',
      pattern: /\bGetOrderedDataStore\s*\(/g,
      name: 'GetOrderedDataStore()',
      severity: 'info',
      desc: 'Accessing an OrderedDataStore, usually for leaderboards.'
    },
    {
      id: 'ds_service',
      pattern: /\bDataStoreService\b/g,
      name: 'DataStoreService reference',
      severity: 'info',
      desc: 'Script accesses DataStoreService. Make sure this is server-side only.'
    },
  ]
};

// ============================================================
//  Scanner
// ============================================================
function scan(code) {
  const lines = code.split('\n');
  const results = { backdoor: [], suspicious: [], remote: [], datastore: [] };

  for (const [cat, rules] of Object.entries(RULES)) {
    for (const rule of rules) {
      rule.pattern.lastIndex = 0;
      let match;
      const seen = new Set();
      while ((match = rule.pattern.exec(code)) !== null) {
        const pos = match.index;
        // find line number
        const linesBefore = code.slice(0, pos).split('\n');
        const lineNum = linesBefore.length;
        const key = `${rule.id}:${lineNum}`;
        if (seen.has(key)) continue;
        seen.add(key);
        const lineContent = lines[lineNum - 1] || '';
        results[cat].push({
          rule,
          lineNum,
          lineContent: lineContent.trimStart(),
          matchText: match[0]
        });
      }
      rule.pattern.lastIndex = 0;
    }
  }
  return results;
}

// ============================================================
//  Render
// ============================================================
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightMatch(lineContent, matchText) {
  const escaped = escHtml(lineContent);
  const escapedMatch = escHtml(matchText);
  return escaped.replace(escapedMatch, `<span class="hl">${escapedMatch}</span>`);
}

function sevClass(s) {
  return { high: 'sev-high', medium: 'sev-medium', low: 'sev-low', info: 'sev-info' }[s] || 'sev-info';
}

const CAT_META = {
  backdoor:   { label: 'Backdoor',   tag: 'tag-back',   title: 'Possible Backdoors' },
  suspicious: { label: 'Suspicious', tag: 'tag-sus',    title: 'Suspicious Patterns' },
  remote:     { label: 'Remote',     tag: 'tag-remote', title: 'Remote Events / Functions' },
  datastore:  { label: 'DataStore',  tag: 'tag-data',   title: 'DataStore Usage' },
};

function renderResults(results) {
  const area = document.getElementById('results-area');
  const summary = document.getElementById('summary');
  document.getElementById('empty-state')?.remove();

  const total = Object.values(results).reduce((a, b) => a + b.length, 0);
  document.getElementById('s-total').textContent  = total;
  document.getElementById('s-back').textContent   = results.backdoor.length;
  document.getElementById('s-sus').textContent    = results.suspicious.length;
  document.getElementById('s-remote').textContent = results.remote.length;
  document.getElementById('s-data').textContent   = results.datastore.length;
  summary.classList.add('visible');

  area.innerHTML = '';

  const order = ['backdoor', 'suspicious', 'remote', 'datastore'];
  for (const cat of order) {
    const items = results[cat];
    const meta  = CAT_META[cat];

    const section = document.createElement('div');
    section.className = 'cat';
    if (items.length === 0) section.classList.add('collapsed');

    let bodyHtml = '';
    if (items.length === 0) {
      bodyHtml = `<div class="no-findings">No findings in this category.</div>`;
    } else {
      for (const item of items) {
        bodyHtml += `
          <div class="finding">
            <div class="finding-meta">
              <span class="line-num">line <strong>${item.lineNum}</strong></span>
              <span class="match-name">${escHtml(item.rule.name)}</span>
              <span class="sev ${sevClass(item.rule.severity)}">${item.rule.severity}</span>
            </div>
            <div class="finding-code">${highlightMatch(item.lineContent, item.matchText)}</div>
            <div class="finding-desc">${escHtml(item.rule.desc)}</div>
          </div>`;
      }
    }

    section.innerHTML = `
      <div class="cat-head">
        <span class="cat-tag ${meta.tag}">${meta.label}</span>
        <span class="cat-title">${meta.title}</span>
        <span class="cat-count">${items.length} finding${items.length !== 1 ? 's' : ''}</span>
        <span class="cat-arrow">&#9660;</span>
      </div>
      <div class="cat-body">${bodyHtml}</div>`;

    section.querySelector('.cat-head').addEventListener('click', () => {
      section.classList.toggle('collapsed');
    });

    area.appendChild(section);
  }
}

// ============================================================
//  UI wiring
// ============================================================
const textarea   = document.getElementById('script-input');
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const charCount  = document.getElementById('char-count');

textarea.addEventListener('input', () => {
  charCount.textContent = textarea.value.length.toLocaleString() + ' chars';
});

document.getElementById('btn-scan').addEventListener('click', () => {
  const code = textarea.value.trim();
  if (!code) return;
  const results = scan(code);
  renderResults(results);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  textarea.value = '';
  charCount.textContent = '0 chars';
  document.getElementById('results-area').innerHTML =
    '<div class="empty-state" id="empty-state"><p>No script scanned yet.</p><p style="margin-top:8px">Paste a script and hit Scan.</p></div>';
  document.getElementById('summary').classList.remove('visible');
});

// Drop zone
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragging');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragging');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    textarea.value = e.target.result;
    charCount.textContent = textarea.value.length.toLocaleString() + ' chars';
  };
  reader.readAsText(file);
}

// Keyboard shortcut: Ctrl+Enter to scan
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    document.getElementById('btn-scan').click();
  }
});
</script>
</body>
